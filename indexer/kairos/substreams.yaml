specVersion: v0.1.0
package:
  name: kairos
  version: v0.1.0

imports:
  stellar: https://spkg.io/streamingfast/stellar-foundational-v0.1.4.spkg

protobuf:
  files:
    - events.proto
  importPaths:
    - ./proto

  excludePaths:
    - sf/substreams/index
    - sf/substreams/rpc
    - sf/substreams/sink
    - sf/substreams/v1
    - google

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ./target/wasm32-unknown-unknown/release/substreams.wasm

modules:
- name: map_kairos_events
  kind: map
  initialBlock: 716387
  inputs:
    - map: stellar:filtered_transactions
  output:
   type: proto:stellar.v1.Events

network: stellar-testnet

params:
  stellar:filtered_transactions: ev:from_address:0x02a3cb3bbbe186b59ba4ee6ce1227c284043be42dc46e84115e4587754a89c04
