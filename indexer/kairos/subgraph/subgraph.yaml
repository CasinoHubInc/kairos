specVersion: 1.0.0
description: kairos Substreams-powered-Subgraph
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: substreams
    name: kairos
    network: stellar-testnet
    source:
      package:
        moduleName: map_kairos_events
        file: ../kairos-v0.1.0.spkg
    mapping:
      apiVersion: 0.0.7
      kind: substreams/graph-entities
      file: ./src/mappings.ts
      handler: handleTriggers